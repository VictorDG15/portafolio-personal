<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="nav-container">

    <a class="nav-logo" href="#hero" (click)="scrollTo($event, '#hero')">
      <ng-container *ngIf="isScrolled; else codeLogo">
        <img src="assets/me_profile.jpeg" pTooltip="Yordi DEV" class="logo-img" (error)="imageError = true"
          *ngIf="!imageError">
        <div class="logo-fallback" *ngIf="imageError">YD</div>
      </ng-container>
      <ng-template #codeLogo>
        <span class="logo-bracket">&lt;</span>
        <span class="logo-name">YD</span>
        <span class="logo-bracket">/&gt;</span>
      </ng-template>
    </a>

    <ul class="nav-links">
      <li *ngFor="let link of navLinks">
        <a [href]="link.href" (click)="scrollTo($event, link.href)" class="nav-link">
          {{ link.label }}
        </a>
      </li>
    </ul>

    <div class="nav-actions">
      <button class="nav-icon-btn" (click)="themeService.toggleTheme()" title="Cambiar Tema">
        <i class="fa" [ngClass]="themeService.isLight ? 'fa-moon' : 'fa-sun'"></i>
      </button>
      <button class="nav-icon-btn lang-toggle" (click)="langService.toggleLanguage()">
        {{ langService.currentLang === 'es' ? 'EN' : 'ES' }}
      </button>

      <!-- <a href="assets/cv/cv-yordi.pdf" target="_blank" class="nav-cta cv-btn">
        <i class="fa fa-download"></i>
        {{ langService.t['NAVBAR']['DOWNLOAD_CV'] }}
      </a> -->

      <a href="mailto:victoryorddiazgonzales@gmail.com" class="nav-cta">
        <i class="fa fa-envelope"></i>
        {{ langService.t['NAVBAR']['HIRE_ME'] }}
      </a>
    </div>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="isMenuOpen">
    <button class="mobile-close" (click)="toggleMenu()">
      <i class="fa fa-times"></i>
    </button>
    <div class="mobile-header">
      <img src="assets/me_profile.jpeg" (error)="imageError = true" *ngIf="!imageError">

      <div class="mobile-user-info" *ngIf="!imageError">
        <span class="name">Yordi</span>
        <span class="role">Developer</span>
      </div>

      <div class="mobile-avatar-fallback" *ngIf="imageError">
        YD
      </div>
    </div>
    <ul>
      <li *ngFor="let link of navLinks">
        <a [href]="link.href" (click)="scrollTo($event, link.href)">
          <i class="fa" [ngClass]="link.icon"></i>
          {{ link.label }}
        </a>
      </li>
    </ul>

    <div class="mobile-actions">
      <div class="mobile-toggles">
        <button class="nav-icon-btn" (click)="themeService.toggleTheme()">
          <i class="fa" [ngClass]="themeService.isLight ? 'fa-moon' : 'fa-sun'"></i>
        </button>
        <button class="nav-icon-btn lang-toggle" (click)="langService.toggleLanguage()">
          {{ langService.currentLang === 'es' ? 'EN' : 'ES' }}
        </button>
      </div>

      <a href="assets/cv/cv-yordi.pdf" target="_blank" class="mobile-btn mobile-btn--outline">
        <i class="fa fa-download"></i>
        {{ langService.t['NAVBAR']['DOWNLOAD_CV'] }}
      </a>

      <a href="mailto:victoryorddiazgonzales@gmail.com" class="mobile-btn mobile-btn--primary">
        <i class="fa fa-envelope"></i>
        {{ langService.t['NAVBAR']['HIRE_ME'] }}
      </a>
    </div>
  </div>

</nav>
