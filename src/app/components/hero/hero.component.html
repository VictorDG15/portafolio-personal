<section id="hero" class="hero">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="hero-content">

      <p class="pre-title">
        <span class="dot"></span>
        {{ langService.t['HERO']['AVAILABLE'] }}
        <span class="dot"></span>
      </p>

      <div class="hero-content" data-aos="fade-right">
        <p class="hero-greeting">{{ langService.t['HERO']['HI'] }} <span class="wave">👋</span></p>
        <h1 class="hero-name">{{ personal.name }} <span>{{ personal.lastName }}</span></h1>

        <div class="hero-role">
          <span class="role-static">&lt;</span>
          <span class="role-dynamic">{{ displayedText }}</span>
          <span class="role-cursor">|</span>
          <span class="role-static">/&gt;</span>
        </div>

        <p class="hero-desc">{{ langService.t['HERO']['DESC'] }}</p>

        <div class="hero-actions">
          <button class="btn-primary" (click)="scrollTo('#projects')">
            {{ langService.t['HERO']['PROJECTS_BTN'] }}
            <i class="fa fa-arrow-right"></i>
          </button>
          <button class="btn-outline" (click)="scrollTo('#contact')">
            {{ langService.t['HERO']['CONTACT_BTN'] }}
          </button>
          <a href="assets/resources/cv.pdf" target="_blank" class="btn-outline">
            <i class="fa fa-download" style="margin-right: 6px;"></i> Mi CV
          </a>
        </div>

      </div>

      <div class="stack-pills">
        <span class="pill" *ngFor="let tech of ['Java', 'Spring Boot', 'Angular', 'Flutter', 'SQL Server']">
          {{ tech }}
        </span>
      </div>

      <div class="hero-stats">
        <div class="stat" *ngFor="let stat of stats">
          <span class="stat-value">{{ stat.value }}</span>
          <span class="stat-label">{{ stat.label }}</span>
        </div>
      </div>
    </div>

    <div class="hero-visual">
      <div class="avatar-ring outer"></div>
      <div class="avatar-ring middle"></div>
      <div class="avatar-container">
        <div class="avatar-container">
          <img *ngIf="!imageError" src="assets/me_profile.jpeg" alt="profile" (error)="onImageError()"
            class="avatar-img" />

          <div *ngIf="imageError" class="avatar-placeholder">
            <i class="fa fa-user-code"></i>
            <span>{{ getInitials() }}</span>
          </div>
        </div>
      </div>
      <div class="float-icon fi-1"><i class="fab fa-java"></i></div>
      <div class="float-icon fi-2"><i class="fab fa-angular"></i></div>
      <div class="float-icon fi-3"><i class="fab fa-docker"></i></div>
      <div class="float-icon fi-4"><i class="fab fa-git-alt"></i></div>
    </div>
  </div>

</section>
